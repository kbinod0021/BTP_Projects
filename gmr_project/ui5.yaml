specVersion: "4.0"

metadata:
  name: gmrproject

type: application

framework:
  name: SAPUI5
  version: "1.148.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
server:
  customMiddleware:
    

    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com

    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300

    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
          



